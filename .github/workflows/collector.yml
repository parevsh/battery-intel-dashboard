name: Collect Battery News

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Call News Collector
        run: |
          curl -X POST https://battery-intel-dashboard.vercel.app/api/collect \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
