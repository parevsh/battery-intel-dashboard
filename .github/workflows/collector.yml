name: Collect Battery News

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Call News Collector
        run: |
          curl -X POST https://YOUR-VERCEL-APP.vercel.app/api/collect \
          -H "Authorization: Bearer YOUR_CRON_SECRET"